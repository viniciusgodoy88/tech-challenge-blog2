name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - uses: actions/checkout@v4

      # 2. Setup Node.js com cache
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Instala dependências de forma limpa (IMPORTANTE)
      - name: Install dependencies
        run: npm ci

      # 4. Debug opcional (ajuda a evitar erro "prisma not found")
      - name: Debug Prisma installation
        run: |
          ls -lah node_modules/.bin
          npx prisma -v

      # 5. Garantir permissão do Prisma (CORRIGE erro "Permission denied")
      - name: Fix Prisma permissions
        run: chmod +x node_modules/.bin/prisma

      # 6. Gerar Prisma Client
      - name: Prisma generate
        run: npx prisma generate --schema=./prisma/schema.prisma

      # 7. Testes
      - name: Run tests
        run: npm test --if-present

      # 8. Build opcional
      - name: Build project
        run: npm run build --if-present